# 공통 설정
spring:
  application:
    name: accessory-erp
  profiles:
    active: dev
  jackson:
    time-zone: Asia/Seoul
    serialization:
      write-dates-as-timestamps: false

server:
  port: 8081
  servlet:
    encoding:
      charset: UTF-8
      force: true

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.erp.accessory.entity
  configuration:
    map-underscore-to-camel-case: true
    default-fetch-size: 100
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

jwt:
  secret: erp-accessory-secret-key-must-be-at-least-32-characters!!
  access-token-expiry: 1800000
  refresh-token-expiry: 604800000

cors:
  allowed-origins: http://localhost:3000

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /api-docs

logging:
  level:
    com.erp.accessory.mapper: TRACE

---
# 개발 환경
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:sqlserver://localhost:1433;databaseName=ACCESSORY_ERP;encrypt=false;trustServerCertificate=true
    username: sa
    password: your_password_here
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver

---
# 운영 환경
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

jwt:
  secret: ${JWT_SECRET}
