<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title layout:title-pattern="$CONTENT_TITLE - ERP Lite">ERP Lite</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>

<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

<!-- 사이드바 -->
<nav class="sidebar" id="sidebar">
    <div class="sidebar-brand">
        <i class="bi bi-grid-3x3-gap-fill me-2"></i>
        <span>ERP Lite</span>
    </div>
    <ul class="sidebar-nav">
        <li class="sidebar-nav-item">
            <a th:href="@{/dashboard}" th:classappend="${activeMenu == 'dashboard'} ? 'active'" class="sidebar-nav-link">
                <i class="bi bi-speedometer2"></i><span>대시보드</span>
            </a>
        </li>

        <li class="sidebar-nav-section">인사관리</li>
        <li class="sidebar-nav-item">
            <a th:href="@{/hr/employees}" th:classappend="${activeMenu == 'hr-employees'} ? 'active'" class="sidebar-nav-link">
                <i class="bi bi-people"></i><span>직원 관리</span>
            </a>
        </li>
        <li class="sidebar-nav-item">
            <a th:href="@{/hr/attendance}" th:classappend="${activeMenu == 'hr-attendance'} ? 'active'" class="sidebar-nav-link">
                <i class="bi bi-calendar-check"></i><span>근태 관리</span>
            </a>
        </li>

        <li class="sidebar-nav-section">영업관리</li>
        <li class="sidebar-nav-item">
            <a th:href="@{/sales/orders}" th:classappend="${activeMenu == 'sales-orders'} ? 'active'" class="sidebar-nav-link">
                <i class="bi bi-cart3"></i><span>수주 관리</span>
            </a>
        </li>
        <li class="sidebar-nav-item">
            <a th:href="@{/sales/customers}" th:classappend="${activeMenu == 'sales-customers'} ? 'active'" class="sidebar-nav-link">
                <i class="bi bi-person-lines-fill"></i><span>고객 관리</span>
            </a>
        </li>

        <li class="sidebar-nav-section">구매관리</li>
        <li class="sidebar-nav-item">
            <a th:href="@{/purchase/orders}" th:classappend="${activeMenu == 'purchase-orders'} ? 'active'" class="sidebar-nav-link">
                <i class="bi bi-bag-check"></i><span>발주 관리</span>
            </a>
        </li>
        <li class="sidebar-nav-item">
            <a th:href="@{/purchase/suppliers}" th:classappend="${activeMenu == 'purchase-suppliers'} ? 'active'" class="sidebar-nav-link">
                <i class="bi bi-building"></i><span>거래처 관리</span>
            </a>
        </li>

        <li class="sidebar-nav-section">재고관리</li>
        <li class="sidebar-nav-item">
            <a th:href="@{/inventory/stock}" th:classappend="${activeMenu == 'inventory-stock'} ? 'active'" class="sidebar-nav-link">
                <i class="bi bi-box-seam"></i><span>재고 현황</span>
            </a>
        </li>
        <li class="sidebar-nav-item">
            <a th:href="@{/inventory/items}" th:classappend="${activeMenu == 'inventory-items'} ? 'active'" class="sidebar-nav-link">
                <i class="bi bi-list-ul"></i><span>품목 관리</span>
            </a>
        </li>

        <li class="sidebar-nav-section">회계관리</li>
        <li class="sidebar-nav-item">
            <a th:href="@{/accounting/ledger}" th:classappend="${activeMenu == 'accounting-ledger'} ? 'active'" class="sidebar-nav-link">
                <i class="bi bi-journal-text"></i><span>전표 관리</span>
            </a>
        </li>
        <li class="sidebar-nav-item">
            <a th:href="@{/accounting/reports}" th:classappend="${activeMenu == 'accounting-reports'} ? 'active'" class="sidebar-nav-link">
                <i class="bi bi-bar-chart-line"></i><span>재무 보고서</span>
            </a>
        </li>
    </ul>
</nav>

<!-- 메인 콘텐츠 -->
<div class="main-content" id="mainContent">
    <nav class="topbar navbar navbar-expand">
        <div class="container-fluid">
            <button class="btn btn-link sidebar-toggle" onclick="toggleSidebar()">
                <i class="bi bi-list fs-4"></i>
            </button>
            <div class="topbar-title">
                <h5 class="mb-0" th:text="${pageTitle}">페이지</h5>
            </div>
            <ul class="navbar-nav ms-auto align-items-center">
                <li class="nav-item">
                    <span class="nav-link text-muted small" sec:authentication="name">사용자</span>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/logout}">
                        <i class="bi bi-box-arrow-right"></i>
                        <span class="d-none d-md-inline ms-1">로그아웃</span>
                    </a>
                </li>
            </ul>
        </div>
    </nav>

    <main class="page-content">
        <div layout:fragment="content"></div>
    </main>

    <footer class="footer text-center text-muted">
        <small>&copy; 2026 ERP Lite. All rights reserved.</small>
    </footer>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function toggleSidebar() {
        const sidebar = document.getElementById('sidebar');
        const mainContent = document.getElementById('mainContent');
        const overlay = document.getElementById('sidebarOverlay');
        if (window.innerWidth <= 768) {
            sidebar.classList.toggle('show');
            overlay.classList.toggle('show');
        } else {
            sidebar.classList.toggle('collapsed');
            mainContent.classList.toggle('expanded');
        }
    }
    window.addEventListener('resize', function () {
        if (window.innerWidth > 768) {
            document.getElementById('sidebar').classList.remove('show');
            document.getElementById('sidebarOverlay').classList.remove('show');
        }
    });
</script>
<th:block layout:fragment="scripts"></th:block>
</body>
</html>
