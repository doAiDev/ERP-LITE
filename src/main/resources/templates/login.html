<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>로그인 - ERP Lite</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background: #f0f4f8;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            width: 100%;
            max-width: 400px;
            border: none;
            border-radius: 1rem;
            box-shadow: 0 8px 30px rgba(0,0,0,0.1);
        }
        .login-brand {
            background: #1e2a3a;
            color: white;
            border-radius: 1rem 1rem 0 0;
            padding: 2rem;
            text-align: center;
        }
    </style>
</head>
<body>
<div class="login-card card">
    <div class="login-brand">
        <i class="bi bi-grid-3x3-gap-fill d-block mb-2" style="font-size:2.5rem"></i>
        <h4 class="fw-bold mb-1">ERP Lite</h4>
        <small class="opacity-75">Enterprise Resource Planning</small>
    </div>
    <div class="card-body p-4">
        <div th:if="${param.error}" class="alert alert-danger py-2 small">
            <i class="bi bi-exclamation-triangle me-1"></i>아이디 또는 비밀번호가 올바르지 않습니다.
        </div>
        <div th:if="${param.logout}" class="alert alert-success py-2 small">
            <i class="bi bi-check-circle me-1"></i>로그아웃 되었습니다.
        </div>
        <form th:action="@{/login}" method="post">
            <div class="mb-3">
                <label class="form-label small fw-semibold">아이디</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-person"></i></span>
                    <input type="text" class="form-control" name="username" placeholder="아이디 입력" required autofocus>
                </div>
            </div>
            <div class="mb-4">
                <label class="form-label small fw-semibold">비밀번호</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-lock"></i></span>
                    <input type="password" class="form-control" name="password" placeholder="비밀번호 입력" required>
                </div>
            </div>
            <button type="submit" class="btn btn-primary w-100 py-2">
                <i class="bi bi-box-arrow-in-right me-1"></i>로그인
            </button>
        </form>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
